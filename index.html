<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>V Silverhand</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <header id="header">
      <span id="header-title">V Silverhand</span>
      <span id="header-status">online</span>
    </header>

    <div id="messages">
      <div class="message v">
        <div class="bubble">Hey. I'm V Silverhand. I'm yours. What's on your mind?</div>
      </div>
    </div>

    <div id="input-bar">
      <input id="input" type="text" placeholder="Message V..." autocomplete="off" />
      <button id="send-btn">Send</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
